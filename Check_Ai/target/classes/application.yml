spring:
  profiles:
    # IDEA本地开发建议启用 local：它会加载 application-local.yml（已在仓库.gitignore里忽略，避免提交密钥）
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.8.128:3306/logisticsAi?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: HikariPool-RedisCacheDemo
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池数量
      maximum-pool-size: 20
      # 自动提交
      auto-commit: true
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接存活最大时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 事务隔离级别（可选值：TRANSACTION_READ_UNCOMMITTED, TRANSACTION_READ_COMMITTED, TRANSACTION_REPEATABLE_READ, TRANSACTION_SERIALIZABLE）
      # MySQL默认：TRANSACTION_REPEATABLE_READ
      transaction-isolation: TRANSACTION_REPEATABLE_READ


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:192.168.8.128}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.8.128}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: auto
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

cache:
  caffeine:
    expire-after-write: ${CAFFEINE_EXPIRE:300}
    maximum-size: ${CAFFEINE_MAX_SIZE:1000}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-strong-secret-key-at-least-32-bytes}
  expiration: 86400000

swagger:
  enabled: true

checkai:
  workflow:
    api-url: ${CHECKAI_WORKFLOW_API_URL:https://api.coze.cn/v1/workflows/chat}
    workflow-id: ${CHECKAI_WORKFLOW_ID:7595443144305852425}
    bot-id: ${CHECKAI_WORKFLOW_BOT_ID:}
    authorization: ${CHECKAI_WORKFLOW_AUTHORIZATION:}
  langchainAgentApi: ${LANGCHAIN_AGENT_API:http://localhost:5000/api/process}
  
  # LangChain4j AI Assistant 配置
  ai:
    # DeepSeek Chat LLM 配置
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-5a4f1bf94ff74aaa984e5a0001867a6f}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
    
    # Ollama Embedding 配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    
    # Milvus 向量数据库配置
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      collection-name: ${MILVUS_COLLECTION:checkai_documents}
      database: ${MILVUS_DATABASE:default}
    
    # RAG 配置
    rag:
      max-segment-size: ${RAG_MAX_SEGMENT_SIZE:500}
      max-overlap-size: ${RAG_MAX_OVERLAP_SIZE:100}
      max-results: ${RAG_MAX_RESULTS:5}
      min-score: ${RAG_MIN_SCORE:0.7}
