spring:
  datasource:
    url: jdbc:mysql://192.168.91.132:3306/logisticsAi?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: HikariPool-RedisCacheDemo
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池数量
      maximum-pool-size: 20
      # 自动提交
      auto-commit: true
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接存活最大时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 事务隔离级别（可选值：TRANSACTION_READ_UNCOMMITTED, TRANSACTION_READ_COMMITTED, TRANSACTION_REPEATABLE_READ, TRANSACTION_SERIALIZABLE）
      # MySQL默认：TRANSACTION_REPEATABLE_READ
      transaction-isolation: TRANSACTION_REPEATABLE_READ


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: 192.168.91.132
      port: 6379
      password: 
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

