spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.91.132:3306/logisticsAi?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.91.132}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.91.132}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: ${SERVER_PORT:8080}

jwt:
  # 生产务必替换为强随机密钥（至少32字节），建议从环境变量注入
  secret: ${JWT_SECRET:change-me-to-a-strong-secret-key-at-least-32-bytes}
  expiration: ${JWT_EXPIRATION_MS:86400000}

checkai:
  workflow:
    # Coze 工作流接口（本项目当前代码实际调用的是 workflows/chat）
    api-url: ${CHECKAI_WORKFLOW_API_URL:https://api.coze.cn/v1/workflows/chat}
    workflow-id: ${CHECKAI_WORKFLOW_ID:7595443144305852425}
    bot-id: ${CHECKAI_WORKFLOW_BOT_ID:}
    # 示例：Bearer pat_xxx（不要写入仓库，改为环境变量注入）
    authorization: ${CHECKAI_WORKFLOW_AUTHORIZATION:}
  langchainAgentApi: ${LANGCHAIN_AGENT_API:http://localhost:5000/api/process}


